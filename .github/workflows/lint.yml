---
name: Lint
on:
  push:
    paths:
      - internal/**
      - api/**
      - cmd/**
  pull_request:
    paths:
      - internal/**
      - api/**
      - cmd/**
jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
