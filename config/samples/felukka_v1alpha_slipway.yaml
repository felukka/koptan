apiVersion: koptan.felukka.sh/v1alpha
kind: Slipway
metadata:
  labels:
    app.kubernetes.io/name: koptan
    app.kubernetes.io/managed-by: kustomize
  name: slipway-go
spec:
  appRef:
    name: goapp-sample
    kind: GoApp
  image:
    registry: ghcr.io
    name: example/myapp
---
apiVersion: koptan.felukka.sh/v1alpha
kind: Slipway
metadata:
  labels:
    app.kubernetes.io/name: koptan
    app.kubernetes.io/managed-by: kustomize
  name: slipway-dotnet
spec:
  appRef:
    name: dotnetapp-sample
    kind: DotnetApp
  image:
    registry: ghcr.io
    name: example/dotnet-api
---
apiVersion: koptan.felukka.sh/v1alpha
kind: Slipway
metadata:
  labels:
    app.kubernetes.io/name: koptan
    app.kubernetes.io/managed-by: kustomize
  name: slipway-java
spec:
  appRef:
    name: javaapp-sample
    kind: JavaApp
  image:
    registry: ghcr.io
    name: example/java-api
---
apiVersion: koptan.felukka.sh/v1alpha
kind: Slipway
metadata:
  labels:
    app.kubernetes.io/name: koptan
    app.kubernetes.io/managed-by: kustomize
  name: slipway-with-steps
spec:
  appRef:
    name: goapp-sample
    kind: GoApp
  image:
    registry: ghcr.io
    name: example/myapp
  steps:
    - name: lint
      custom:
        image: golangci/golangci-lint:latest
        command: ["golangci-lint", "run"]
    - name: scan
      custom:
        image: aquasec/trivy:latest
        command: ["trivy", "fs", "."]
---
apiVersion: koptan.felukka.sh/v1alpha
kind: Slipway
metadata:
  labels:
    app.kubernetes.io/name: koptan
    app.kubernetes.io/managed-by: kustomize
  name: slipway-with-sonarqube
spec:
  appRef:
    name: goapp-sample
    kind: GoApp
  image:
    registry: ghcr.io
    name: example/myapp-sonar
  steps:
    - name: sonar
      type: SonarQube
      params:
        endpoint: "http://sonarqube.sonar.svc.cluster.local:9000"
        projectKey: "my-project"
        qualityGate: "true"
        tokenSecret: "sonar-secret"
