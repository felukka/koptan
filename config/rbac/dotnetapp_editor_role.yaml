# This rule is not used by the project koptan itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the koptan.felukka.sh.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: koptan
    app.kubernetes.io/managed-by: kustomize
  name: dotnetapp-editor-role
rules:
- apiGroups:
  - koptan.felukka.sh
  resources:
  - dotnetapps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - koptan.felukka.sh
  resources:
  - dotnetapps/status
  verbs:
  - get
